<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invincibles CoTax - Client Details Form</title>
  <style>
    :root {
      --bg-1: #f8fbff;
      --bg-2: #eef5ff;
      --bg-3: #f9fcff;
      --surface: rgba(255, 255, 255, 0.8);
      --text: #24324a;
      --text-soft: #60708d;
      --line: rgba(186, 205, 232, 0.45);
      --primary: #5b8def;
      --primary-2: #7fb3ff;
      --teal: #57c6c2;
      --danger: #c45d73;
      --success: #2f8d6a;
      --warning: #c8862f;
      --shadow-lg: 0 24px 60px rgba(115, 149, 199, 0.18);
      --shadow-sm: 0 8px 20px rgba(122, 152, 199, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(168, 202, 255, 0.26), transparent 28%),
        radial-gradient(circle at 100% 10%, rgba(126, 215, 193, 0.22), transparent 24%),
        radial-gradient(circle at 70% 100%, rgba(246, 183, 200, 0.18), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
      overflow-x: hidden;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 26px;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(201, 216, 238, 0.45);
      box-shadow: 0 8px 24px rgba(141, 169, 207, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.65)),
        linear-gradient(135deg, var(--primary), var(--teal));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #3b67b7;
      font-size: 15px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo {
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #4d7fe5, #61b7d5, #4d7fe5);
      background-size: 200% auto;
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      animation: shimmer 5s linear infinite;
    }

    .logo-sub {
